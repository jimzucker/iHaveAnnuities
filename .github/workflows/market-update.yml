# market-update.yml — refresh data/market.json at 5pm ET on trading days.
# Copyright 2026 Jim Zucker
# SPDX-License-Identifier: Apache-2.0
name: market-update

on:
  schedule:
    # 21:00 & 22:00 UTC cover 5pm ET across DST; the script no-ops off-hours/days.
    - cron: '0 21 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: fetch prices
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 scripts/fetch_market.py --force
          else
            python3 scripts/fetch_market.py
          fi
      - name: commit if changed
        run: |
          if ! git diff --quiet -- data/market.json data/history.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/market.json data/history.json
            git commit -m "market: prices as of $(date -u +%F)"
            git push
          else
            echo "no market change"
          fi
