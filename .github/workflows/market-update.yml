# market-update.yml — refresh prices at 5pm ET on trading days and publish them
# to the orphan `market-data` branch (NOT main, so main's history stays clean).
# Copyright 2026 Jim Zucker
# SPDX-License-Identifier: LicenseRef-Proprietary
name: market-update

on:
  schedule:
    # 21:00 & 22:00 UTC cover 5pm ET across DST; the script no-ops off-hours/days.
    - cron: '0 21 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6           # main — has the fetch script + data/ snapshot
      - uses: actions/checkout@v6           # the publish target branch, in a subdir
        with:
          ref: market-data
          path: market-data
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: fetch prices
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 scripts/fetch_market.py --force
          else
            python3 scripts/fetch_market.py
          fi
      - name: publish to market-data branch
        run: |
          # The script writes data/*.json ONLY on a real 5pm trading-day run
          # (they aren't committed on main), so their absence means it skipped.
          if [ ! -f data/market.json ] || [ ! -f data/history.json ]; then
            echo "no fresh prices (skipped)"
            exit 0
          fi
          cp data/market.json market-data/market.json
          cp data/history.json market-data/history.json
          cd market-data
          if git diff --quiet; then
            echo "prices unchanged vs. branch"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json history.json
          git commit -m "market: prices as of $(date -u +%F)"
          git push
