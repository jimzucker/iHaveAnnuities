# test.yml — CI gate: analyze + test with coverage threshold.
# Copyright 2026 Jim Zucker
# SPDX-License-Identifier: Apache-2.0
name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: pub get
        working-directory: app
        run: flutter pub get
      - name: analyze
        working-directory: app
        run: flutter analyze
      - name: test + coverage
        working-directory: app
        # Exclude 'golden' screenshot tests — they're a README image generator,
        # not a regression check (font rendering is platform-specific).
        run: flutter test --coverage --exclude-tags golden
      - name: coverage gate (core 100% / data ≥95%)
        run: python3 scripts/check_coverage.py app/coverage/lcov.info
