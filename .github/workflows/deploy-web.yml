# SPDX-License-Identifier: LicenseRef-Proprietary
name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: build web
        working-directory: app
        run: |
          # Version is the single source of truth in pubspec.yaml (semver only).
          VERSION=$(awk '/^version:/{print $2}' pubspec.yaml | cut -d+ -f1)
          flutter pub get
          flutter build web --release --base-href /iHaveAnnuities/ \
            --dart-define=BUILD_SHA=${{ github.sha }} \
            --dart-define=APP_VERSION="$VERSION"
      # Stamp the deployed build id so a kept-open tab can detect a new version.
      - name: write build-id.json
        run: echo '{"sha":"${{ github.sha }}"}' > app/build/web/build-id.json
      # Prices are fetched at runtime from the `market-data` branch (raw URL),
      # so nothing market-related needs bundling into the build.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: app/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
